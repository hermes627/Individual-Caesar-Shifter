<!DOCTYPE html>
<html>
<body>
<h1>Shoutout to xxsigmagoatxx for this html code (go give them a star)</h1>

<input id="text" placeholder="Enter string">
<input id="nums" placeholder="Enter numbers separated by spaces">

<select id="direction">
  <option value="right">Shift Right (+)</option>
  <option value="left">Shift Left (−)</option>
</select>

<button onclick="run()">Run</button>

<p id="output"></p>

<script>
function run(){
    let orig = document.getElementById("text").value;
    let nums = document.getElementById("nums").value.split(" ").map(Number);
    let dir = document.getElementById("direction").value;

    let caesar = "";

    for(let i=0;i<orig.length;i++){
        let now = orig[i];
        let shift = nums[i] || 0;

        // If left shift, make it negative
        if(dir === "left"){
            shift = -shift;
        }

        if(now >= 'A' && now <= 'Z'){
            caesar += String.fromCharCode((now.charCodeAt(0) - 65 + shift + 26) % 26 + 65);
        } else if(now >= 'a' && now <= 'z'){
            caesar += String.fromCharCode((now.charCodeAt(0) - 97 + shift + 26) % 26 + 97);
        } else {
            // Keep non-letters unchanged
            caesar += now;
        }
    }

    document.getElementById("output").innerText = caesar;
}
</script>

</body>
</html>
